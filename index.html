<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신강인테크 DB</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="db_app.css">
</head>
<body>

<!-- 구분 자동완성 datalist -->
<datalist id="type-list">
  <option value="Parts">
  <option value="Equipment">
  <option value="자동창고">
  <option value="소물">
  <option value="공용재">
  <option value="WES">
  <option value="운송">
  <option value="외주">
  <option value="인건비">
  <option value="기타">
</datalist>

<!-- ══════════════════════════════════════════════════
     TOAST
══════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">신강</div>
      <h1>신강인테크 DB</h1>
      <p>Parts & Equipment Database</p>
    </div>
    <div class="login-field">
      <label>접속 비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">접속</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     APP
══════════════════════════════════════════════════ -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">S</div>
      <div>
        <div class="sidebar-title">신강인테크</div>
        <div class="sidebar-sub">Parts DB</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section">
        <div class="nav-section-label">메인</div>
        <div class="nav-item active" onclick="navigate('dashboard')">
          <span class="icon">📊</span> 대시보드
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">설정</div>
        <div class="nav-item" onclick="navigate('settings-staff')">
          <span class="icon">👤</span> 직원 관리
        </div>
        <div class="nav-item" onclick="navigate('settings-vendor')">
          <span class="icon">🏢</span> 공급사 관리
        </div>
        <div class="nav-item" onclick="navigate('settings-project')">
          <span class="icon">📁</span> 프로젝트 관리
        </div>
        <div class="nav-item" onclick="navigate('settings-codes')">
          <span class="icon">🗂️</span> 코드 관리
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Master DB</div>
        <div class="nav-item" onclick="navigate('master-parts')">
          <span class="icon">🔩</span> Parts
        </div>
        <div class="nav-item" onclick="navigate('master-equipment')">
          <span class="icon">⚙️</span> Equipment
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">등록</div>
        <div class="nav-item" onclick="navigate('reg-quotation')">
          <span class="icon">📋</span> 견적 등록
        </div>
        <div class="nav-item" onclick="navigate('reg-purchase')">
          <span class="icon">🛒</span> 구매 등록
        </div>
        <div class="nav-item" onclick="navigate('reg-sales')">
          <span class="icon">📦</span> 판매 등록
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">리스트</div>
        <div class="nav-item" onclick="navigate('list-quotation')">
          <span class="icon">📑</span> 견적 목록
        </div>
        <div class="nav-item" onclick="navigate('list-purchase')">
          <span class="icon">📥</span> 구매 목록
        </div>
        <div class="nav-item" onclick="navigate('list-sales')">
          <span class="icon">📤</span> 판매 목록
        </div>
      </div>

    </nav>

    <div class="sidebar-footer">
      <span id="sidebar-user" style="font-size:11px; color:var(--text3)">로그인됨</span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">대시보드</div>
        <div class="topbar-sub"  id="topbar-sub">신강인테크 Parts & Equipment DB</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <div class="content" id="content">
      <!-- 페이지들이 여기 렌더링 -->
    </div>
  </main>
</div>

<script src="db_app.js"></script>
</body>
</html>
